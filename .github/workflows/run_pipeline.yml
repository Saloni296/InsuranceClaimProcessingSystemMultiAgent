name: Run GenAI Pipeline

on:
  push:
  workflow_dispatch:

jobs:
  run-pipeline:
    name: Run pipeline and upload results
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi

      - name: Run pipeline
        working-directory: ${{ github.workspace }}
        run: |
          echo "Running from $(pwd)"
          echo "PYTHONPATH=$PWD"
          PYTHONPATH=$PWD python main.py

      - name: Upload processing results
        uses: actions/upload-artifact@v4
        with:
          name: processing-results
          path: processing_results.json

      - name: Commit reports back to repo
        if: always()
        run: |
          echo "Committing reports to repository"
          git status
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/*.json || true
          git commit -m "Add generated reports from CI" || echo "No changes to commit"
          git push
